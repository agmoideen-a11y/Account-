<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വരവ് ചിലവ് എൻട്രി</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .form-container { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a5d1a; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>വരവ് ചിലവ് എൻട്രി</h2>
    <form id="entryForm">
        <input type="text" id="date" placeholder="തീയതി (DD-MM-YYYY)" required>
        <input type="text" id="voucher" placeholder="വൗച്ചർ നമ്പർ">
        <input type="text" id="particulars" placeholder="വിവരണം" required>
        <label>വരവ്:</label>
        <input type="number" id="income" value="0" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'">
        <label>ചിലവ്:</label>
        <input type="number" id="expense" value="0" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'">
        <button type="submit" id="submitBtn">സേവ് ചെയ്യുക</button>
    </form>
</div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyEY2zrhXWtkUUlJZtulyXr86DBBfn-LI_i2aNxwCGK4G1vtMIeBmkcc2_9gUEI42L9/exec';
    document.getElementById('entryForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "അയക്കുന്നു...";
        fetch(scriptURL + ?date=${encodeURIComponent(document.getElementById('date').value)}&voucher=${encodeURIComponent(document.getElementById('voucher').value)}&particulars=${encodeURIComponent(document.getElementById('particulars').value)}&income=${document.getElementById('income').value}&expense=${document.getElementById('expense').value}, { method: 'POST', mode: 'no-cors' })
        .then(() => { alert("സേവ് ചെയ്തു!"); location.reload(); });
    });
</script>
</body>
</html>
